<!doctype html>
<html lang="{{ 'kn' if current_language == 'kn' else 'en' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}HRP Family Tree{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div>
            <a class="brand" href="{{ url_for('index') }}">HRP Family Tree</a>
            <p class="tagline">Search people and explore family relationships.</p>
        </div>
        <form class="language-switcher" action="{{ url_for('set_language') }}" method="post">
            <input type="hidden" name="next" value="{{ request.full_path if request.query_string else request.path }}">
            <label for="language">Display</label>
            <select id="language" name="language" onchange="this.form.submit()">
                <option value="en" {% if current_language == 'en' %}selected{% endif %}>English</option>
                <option value="kn" {% if current_language == 'kn' %}selected{% endif %}>ಕನ್ನಡ</option>
            </select>
        </form>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>Built with Flask, CSV data, and maintainable family tree modules.</span>
    </footer>
</body>
</html>
